name: Refresh index

# Regenerates the live bits of index.html (status dots, activity ticker,
# guestbook) and commits the result back to main, which redeploys Pages.
on:
  schedule:
    - cron: '17 6 * * *'   # daily, 06:17 UTC
  workflow_dispatch:        # run on demand from the Actions tab
  issues:                   # re-render the guestbook when issues change
    types: [opened, edited, deleted, labeled, unlabeled, closed, reopened]

permissions:
  contents: write   # commit the regenerated index.html
  issues: read      # read guestbook issues

concurrency:
  group: refresh-index
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Refresh and publish (race-safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Re-sync to the freshest remote and regenerate before each push attempt,
          # so concurrent issue events / pushes can't leave a stale page behind
          # (e.g. a deleted issue lingering because that run's push was rejected).
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            python3 scripts/generate.py
            if git diff --quiet -- index.html; then
              echo "No changes to publish."
              exit 0
            fi
            git add index.html
            git commit --quiet -m "Refresh index (status, activity, guestbook)"
            if git push origin HEAD:main; then
              echo "Published on attempt $attempt."
              exit 0
            fi
            echo "Push raced with another update; re-syncing and retrying ($attempt/5)."
            sleep $((attempt * 3))
          done
          echo "::error::Failed to publish after 5 attempts."
          exit 1
