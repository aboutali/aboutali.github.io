name: Refresh index

# Regenerates the live bits of index.html (status dots, activity ticker,
# guestbook) and commits the result back to main, which redeploys Pages.
on:
  schedule:
    - cron: '17 6 * * *'   # daily, 06:17 UTC
  workflow_dispatch:        # run on demand from the Actions tab
  issues:                   # re-render the guestbook when issues change
    types: [opened, edited, deleted, labeled, unlabeled, closed, reopened]

permissions:
  contents: write   # commit the regenerated index.html
  issues: read      # read guestbook issues

concurrency:
  group: refresh-index
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Refresh index (status, activity, guestbook)"
            git push
          else
            echo "No changes to commit."
          fi
